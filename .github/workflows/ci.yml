name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # E2E suite spawns its own prod server on PORT=3038 with demo-mode env.
      # Tests that hit external endpoints (YouTube oEmbed, X syndication)
      # soft-fail gracefully by design — do NOT add continue-on-error here.
      - name: E2E tests
        run: npm run test:e2e
